<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Lab - Hadamard & Bloch</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(15, 23, 42, 0.9);
            --accent-color: #00ffcc;
            --text-color: #f1f5f9;
        }
        body { 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        /* Layout Geral Split */
        #app-container {
            display: flex;
            flex-direction: row;
            height: calc(100vh - 180px);
            width: 100vw;
        }
        @media (max-width: 900px) {
            #app-container { flex-direction: column; height: auto; }
            #canvas-container { height: 400px; }
        }

        #canvas-container {
            flex: 1;
            position: relative;
            background: #0b0f19;
            min-height: 350px;
        }

        #panel-container {
            width: 400px;
            background: var(--panel-bg);
            border-left: 1px solid rgba(255,255,255,0.1);
            padding: 20px;
            overflow-y: auto;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Seletor de Idiomas */
        .lang-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 10px;
        }
        .lang-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text-color);
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        .lang-btn.active, .lang-btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
        }

        h2 { margin: 0; font-size: 1.2rem; color: var(--accent-color); letter-spacing: 1px; }
        #state-vector { font-family: monospace; font-size: 1rem; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; margin: 10px 0; border-left: 3px solid var(--accent-color); }

        /* Circuito Quântico */
        #circuit-area {
            background: rgba(15, 23, 42, 0.95);
            border-top: 2px solid rgba(255,255,255,0.1);
            padding: 15px 30px;
            box-sizing: border-box;
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .circuit-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .qubit-lines-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        .qubit-line {
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
        }
        .qubit-label {
            font-family: monospace;
            font-weight: bold;
            min-width: 70px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02);
            text-align: center;
        }
        .qubit-label.active {
            background: rgba(0, 255, 204, 0.15);
            border: 1px solid var(--accent-color);
            box-shadow: 0 0 8px rgba(0, 255, 204, 0.3);
        }
        .wire {
            flex-grow: 1;
            height: 2px;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 8px;
            padding-left: 10px;
        }
        .gate-btn {
            background: #1e293b;
            border: 1px solid var(--accent-color);
            color: var(--text-color);
            border-radius: 4px;
            cursor: pointer;
            padding: 4px 10px;
            font-size: 0.8rem;
            font-family: monospace;
            transition: all 0.2s;
        }
        .gate-btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }
        .reset-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: opacity 0.2s;
        }
        .reset-btn:hover { opacity: 0.9; }
        
        .reset-single-btn {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid #ef4444;
            color: #fca5a5;
            padding: 3px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: all 0.2s;
        }
        .reset-single-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* Controles manuais */
        .manual-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input[type=range] {
            width: 100%;
            accent-color: var(--accent-color);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="app-container">
        <!-- Esfera 3D -->
        <div id="canvas-container"></div>

        <!-- Painel de Dados Lateral -->
        <div id="panel-container">
            <div class="lang-selector">
                <button class="lang-btn active" onclick="setLanguage('pt')">PT</button>
                <button class="lang-btn" onclick="setLanguage('en')">EN</button>
                <button class="lang-btn" onclick="setLanguage('es')">ES</button>
                <button class="lang-btn" onclick="setLanguage('fr')">FR</button>
                <button class="lang-btn" onclick="setLanguage('ru')">RU</button>
                <button class="lang-btn" onclick="setLanguage('ar')">AR</button>
                <button class="lang-btn" onclick="setLanguage('fa')">FA</button>
                <button class="lang-btn" onclick="setLanguage('zh')">ZH</button>
            </div>

            <h2 id="lbl-title">ESFERA DE BLOCH</h2>
            <div id="state-vector">|ψ⟩ = 1.00|0⟩ + 0.00|1⟩</div>

            <div>
                <strong id="lbl-analise">Análise Didática:</strong>
                <p id="lbl-explanation" style="font-size: 0.9rem; line-height: 1.4; opacity: 0.9;"></p>
            </div>

            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1);">

            <!-- Controles Manuais -->
            <div class="manual-controls">
                <label id="lbl-theta">θ (Latitude)</label>
                <input type="range" id="theta" min="0" max="3.1415" step="0.01" value="0">
                
                <label id="lbl-phi">φ (Longitude)</label>
                <input type="range" id="phi" min="0" max="6.2831" step="0.01" value="0">
            </div>
        </div>
    </div>

    <!-- Simulador de Circuitos Quânticos -->
    <div id="circuit-area">
        <div class="circuit-title-row">
            <h2 id="lbl-circuit-title">Simulador de Circuito Quântico</h2>
            <button class="reset-btn" onclick="resetAll()" id="lbl-reset">Reinicializar Todos</button>
        </div>

        <div class="qubit-lines-container">
            <!-- Qubit 1 -->
            <div class="qubit-line">
                <div class="qubit-label active" id="q0-lbl" onclick="selectQubit(0)">q[0]: |0⟩</div>
                <div class="wire">
                    <button class="gate-btn" onclick="applyHadamard(0)">H</button>
                    <button class="gate-btn" onclick="applyX(0)">NOT (X)</button>
                    <button class="gate-btn" onclick="applyMeasure(0)" id="lbl-m0">Medir</button>
                    <button class="reset-single-btn" onclick="resetSingle(0)" id="lbl-r0">Reset</button>
                </div>
            </div>
            <!-- Qubit 2 -->
            <div class="qubit-line">
                <div class="qubit-label" id="q1-lbl" onclick="selectQubit(1)">q[1]: |0⟩</div>
                <div class="wire">
                    <button class="gate-btn" onclick="applyHadamard(1)">H</button>
                    <button class="gate-btn" onclick="applyX(1)">NOT (X)</button>
                    <button class="gate-btn" onclick="applyCNOT(0, 1)">CNOT (q0->q1)</button>
                    <button class="gate-btn" onclick="applyMeasure(1)" id="lbl-m1">Medir</button>
                    <button class="reset-single-btn" onclick="resetSingle(1)" id="lbl-r1">Reset</button>
                </div>
            </div>
            <!-- Qubit 3 -->
            <div class="qubit-line">
                <div class="qubit-label" id="q2-lbl" onclick="selectQubit(2)">q[2]: |0⟩</div>
                <div class="wire">
                    <button class="gate-btn" onclick="applyHadamard(2)">H</button>
                    <button class="gate-btn" onclick="applyX(2)">NOT (X)</button>
                    <button class="gate-btn" onclick="applyCNOT(1, 2)">CNOT (q1->q2)</button>
                    <button class="gate-btn" onclick="applyMeasure(2)" id="lbl-m2">Medir</button>
                    <button class="reset-single-btn" onclick="resetSingle(2)" id="lbl-r2">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dicionário de Idiomas
        const translations = {
            pt: {
                title: "ESFERA DE BLOCH",
                analise: "Análise Didática:",
                theta: "θ (Theta - Latitude/Fase Co-latitude)",
                phi: "φ (Phi - Longitude/Fase Quântica)",
                circuit: "Simulador de Circuito Quântico",
                reset: "Reinicializar Todos",
                measure: "Medir",
                pure0: "O Qubit está no estado fundamental puro |0⟩. Um colapso clássico dará '0' com 100% de certeza.",
                pure1: "O Qubit está no estado excitado puro |1⟩. Um colapso clássico dará '1' com 100% de certeza.",
                superposition: "Estado de Superposição Quântica. O qubit está suspenso entre o |0⟩ e o |1⟩. Portas como Hadamard (H) o colocam nesse estado matemático dinâmico.",
                entangled: "Atenção: Este Qubit sofreu emaranhamento via CNOT. Seu estado está correlacionado à outra partícula quântica!",
                measuring: "Qubit medido! O estado colapsou para um valor definido."
            },
            en: {
                title: "BLOCH SPHERE",
                analise: "Didactic Analysis:",
                theta: "θ (Theta - Latitude/Co-latitude Phase)",
                phi: "φ (Phi - Longitude/Quantum Phase)",
                circuit: "Quantum Circuit Simulator",
                reset: "Reset All Qubits",
                measure: "Measure",
                pure0: "The Qubit is in the pure ground state |0⟩. A classical collapse will yield '0' with 100% certainty.",
                pure1: "The Qubit is in the pure excited state |1⟩. A classical collapse will yield '1' with 100% certainty.",
                superposition: "Quantum Superposition State. The qubit is suspended between |0⟩ and |1⟩. Gates like Hadamard (H) place it here.",
                entangled: "Warning: This Qubit is entangled via CNOT! Its state is physically correlated to another qubit.",
                measuring: "Qubit measured! The state collapsed to a definite classical value."
            },
            es: {
                title: "ESFERA DE BLOCH",
                analise: "Análisis Didáctico:",
                theta: "θ (Theta - Latitud)",
                phi: "φ (Phi - Longitud)",
                circuit: "Simulador de Circuito Cuántico",
                reset: "Reiniciar Todos",
                measure: "Medir",
                pure0: "El Qubit está en el estado puro fundamental |0⟩. Dará '0' con 100% de certeza al medir.",
                pure1: "El Qubit está en el estado puro excitado |1⟩. Dará '1' con 100% de certeza al medir.",
                superposition: "Superposición Cuántica. El qubit flota entre |0⟩ y |1⟩ simultáneamente hasta ser medido.",
                entangled: "¡Emaranamiento detectado! Este Qubit está correlacionado por una compuerta CNOT.",
                measuring: "¡Qubit medido! El estado ha colapsado."
            },
            fr: {
                title: "SPHÈRE DE BLOCH",
                analise: "Analyse Didactique :",
                theta: "θ (Thêta - Latitude)",
                phi: "φ (Phi - Longitude)",
                circuit: "Simulateur de Circuit Quantique",
                reset: "Réinitialiser Tout",
                measure: "Mesurer",
                pure0: "Le Qubit est dans l'état fondamental pur |0⟩. Une mesure donnera '0' à 100%.",
                pure1: "Le Qubit est dans l'état excité pur |1⟩. Une mesure donnera '1' à 100%.",
                superposition: "Superposition Quantique. Le qubit oscille entre |0⟩ et |1⟩ avant la mesure.",
                entangled: "Intrication Quantique ! Ce qubit est corrélé à un autre par une porte CNOT.",
                measuring: "Qubit mesuré ! L'état s'est effondré."
            },
            ru: {
                title: "СФЕРА БЛОХА",
                analise: "Дидактический анализ:",
                theta: "θ (Тета - Широта)",
                phi: "φ (Фи - Долгота)",
                circuit: "Квантовый симулятор цепи",
                reset: "Сбросить все кубиты",
                measure: "Измерить",
                pure0: "Кубит в чистом основном состоянии |0⟩. Измерение даст '0' со 100% вероятностью.",
                pure1: "Кубит в возбужденном состоянии |1⟩. Измерение даст '1' со 100% вероятностью.",
                superposition: "Квантовая суперпозиция. Кубит находится одновременно в |0⟩ и |1⟩.",
                entangled: "Квантовая запутанность! Этот кубит связан с другим через CNOT.",
                measuring: "Кубит измерен! Произошел коллапс волновой функции."
            },
            ar: {
                title: "كرة بلوخ",
                analise: "التحليل التعليمي:",
                theta: "θ (ثيتا - خط العرض)",
                phi: "φ (فاي - خط الطول)",
                circuit: "محاكي الدائرة الكمومية",
                reset: "إعادة ضبط الكل",
                measure: "قياس",
                pure0: "الكيوبت في الحالة الأساسية النقية |0⟩. القياس سيعطي '0' بنسبة 100%.",
                pure1: "الكيوبت في الحالة المثارة النقية |1⟩. القياس سيعطي '1' بنسبة 100%.",
                superposition: "حالة التراكب الكمي. الكيوبت معلق بين |0⟩ و |1⟩ حتى قياسه.",
                entangled: "الكيوبت متشابك عبر بوابة CNOT مع جسيم آخر!",
                measuring: "تم القياس! انهارت الدالة الموجية."
            },
            fa: {
                title: "کره بلاخ",
                analise: "تحلیل آموزشی:",
                theta: "θ (تتا - عرض جغرافیایی)",
                phi: "فی - طول جغرافیایی",
                circuit: "شبیه‌ساز مدار کوانتومی",
                reset: "بازنشانی همه",
                measure: "اندازه‌گیری",
                pure0: "کیوبیت در حالت پایه خالص |0⟩ قرار دارد. اندازه‌گیری با احتمال ۱۰۰٪ خروجی '۰' می‌دهد.",
                pure1: "کیوبیت در حالت برانگیخته خالص |1⟩ قرار دارد. اندازه‌گیری خروجی '۱' می‌دهد.",
                superposition: "در حالت درهم‌تنیدگی/ابرمرتبه کوانتومی. کیوبیت در حالت میانی معلق است.",
                entangled: "این کیوبیت درهم‌تنیده است! حالت آن به کیوبیت دیگر وابسته است.",
                measuring: "اندازه‌گیری شد! فروپاشی حالت کوانتومی رخ داد."
            },
            zh: {
                title: "布洛赫球面",
                analise: "教学分析:",
                theta: "θ (西塔 - 纬度)",
                phi: "φ (斐 - 经度)",
                circuit: "量子电路模拟器",
                reset: "重置所有",
                measure: "测量",
                pure0: "量子比特处于纯基态 |0⟩。测量将有 100% 几率坍缩为 0。",
                pure1: "量子比特处于纯激发态 |1⟩。测量将有 100% 几率坍缩为 1。",
                superposition: "量子叠加态。利用哈达玛门（H）可以使量子比特悬浮于二者之间。",
                entangled: "纠缠态！该量子比特通过 CNOT 门与其它比特发生纠缠。",
                measuring: "测量完成！波函数发生坍缩。"
            }
        };

        let currentLang = 'pt';
        let activeQubit = 0;

        // Estado inicial de 3 qubits
        let qubitsState = [
            { theta: 0, phi: 0, status: 'pure0' },
            { theta: 0, phi: 0, status: 'pure0' },
            { theta: 0, phi: 0, status: 'pure0' }
        ];

        function setLanguage(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('lbl-title').innerText = translations[lang].title;
            document.getElementById('lbl-analise').innerText = translations[lang].analise;
            document.getElementById('lbl-theta').innerText = translations[lang].theta;
            document.getElementById('lbl-phi').innerText = translations[lang].phi;
            document.getElementById('lbl-circuit-title').innerText = translations[lang].circuit;
            document.getElementById('lbl-reset').innerText = translations[lang].reset;
            
            for(let i=0; i<3; i++) {
                document.getElementById('lbl-m'+i).innerText = translations[lang].measure;
            }
            updateStateVisuals();
        }

        // Configuração Tridimensional (Three.js corrigido)
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // Garantindo tamanhos corretos
        const width = container.clientWidth || window.innerWidth * 0.6;
        const height = container.clientHeight || 500;
        
        const camera = new THREE.PerspectiveCamera(45, width / height, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(width, height);
        renderer.setClearColor(0x0b0f19, 1);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // Grupo da Esfera
        const sphereGroup = new THREE.Group();
        scene.add(sphereGroup);

        // Grid da Esfera (Material Básico para garantir renderização sem luz)
        const sphereGeo = new THREE.SphereGeometry(2, 30, 15);
        const sphereMat = new THREE.MeshBasicMaterial({ 
            color: 0x3b82f6, 
            wireframe: true, 
            transparent: true, 
            opacity: 0.25 
        });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        sphereGroup.add(sphere);

        // Anel Equador
        const ringGeo = new THREE.RingGeometry(1.98, 2.02, 64);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
        const equator = new THREE.Mesh(ringGeo, ringMat);
        equator.rotation.x = Math.PI / 2;
        sphereGroup.add(equator);

        // Eixos Cartesianos internos de referência
        const axesHelper = new THREE.AxesHelper(2.3);
        sphereGroup.add(axesHelper);

        // Vetor (Seta de Estado)
        const arrowHelper = new THREE.ArrowHelper(
            new THREE.Vector3(0, 1, 0), 
            new THREE.Vector3(0, 0, 0), 
            2, 
            0x00ffcc, 
            0.4, 
            0.15
        );
        sphereGroup.add(arrowHelper);

        camera.position.set(3, 3, 5.5);

        // Lógica de Atualização Física/Estética
        function updateStateVisuals() {
            const q = qubitsState[activeQubit];
            
            // Atualizar Sliders
            document.getElementById('theta').value = q.theta;
            document.getElementById('phi').value = q.phi;

            // Converter para Cartesianas (Y é altura no ThreeJS)
            const x = Math.sin(q.theta) * Math.cos(q.phi);
            const z = Math.sin(q.theta) * Math.sin(q.phi);
            const y = Math.cos(q.theta);
            
            arrowHelper.setDirection(new THREE.Vector3(x, y, z));

            // Vetor ket formatado
            const amp0 = Math.cos(q.theta / 2).toFixed(2);
            const amp1 = Math.sin(q.theta / 2).toFixed(2);
            document.getElementById('state-vector').innerHTML = `|ψ⟩ = ${amp0}|0⟩ + e^(i·${q.phi.toFixed(2)})${amp1}|1⟩`;

            // Textos explicativos didáticos baseados no estado
            let explanation = translations[currentLang][q.status] || translations[currentLang].superposition;
            document.getElementById('lbl-explanation').innerText = explanation;
        }

        // Funções das Portas Lógicas do Simulador
        function applyHadamard(id) {
            let q = qubitsState[id];
            if (q.theta === 0) {
                q.theta = Math.PI / 2;
                q.phi = 0;
            } else if (Math.abs(q.theta - Math.PI) < 0.1) {
                q.theta = Math.PI / 2;
                q.phi = Math.PI;
            } else {
                q.theta = 0;
                q.phi = 0;
            }
            q.status = 'superposition';
            updateStateVisuals();
            syncCircuitLabels();
        }

        function applyX(id) {
            let q = qubitsState[id];
            q.theta = Math.PI - q.theta;
            q.status = q.theta > 1.5 ? 'pure1' : 'pure0';
            updateStateVisuals();
            syncCircuitLabels();
        }

        function applyCNOT(control, target) {
            let ctrlQ = qubitsState[control];
            let tgtQ = qubitsState[target];
            if (ctrlQ.theta > 0.5) { 
                tgtQ.theta = Math.PI - tgtQ.theta;
                tgtQ.status = 'entangled';
            }
            updateStateVisuals();
            syncCircuitLabels();
        }

        function applyMeasure(id) {
            let q = qubitsState[id];
            const p0 = Math.pow(Math.cos(q.theta / 2), 2);
            const r = Math.random();
            
            if (r < p0) {
                q.theta = 0;
                q.phi = 0;
                q.status = 'pure0';
            } else {
                q.theta = Math.PI;
                q.phi = 0;
                q.status = 'pure1';
            }
            updateStateVisuals();
            syncCircuitLabels();
        }

        // Reinicialização de um único qubit
        function resetSingle(id) {
            qubitsState[id] = { theta: 0, phi: 0, status: 'pure0' };
            if (id === activeQubit) {
                updateStateVisuals();
            }
            syncCircuitLabels();
        }

        // Reinicialização de todos
        function resetAll() {
            qubitsState = [
                { theta: 0, phi: 0, status: 'pure0' },
                { theta: 0, phi: 0, status: 'pure0' },
                { theta: 0, phi: 0, status: 'pure0' }
            ];
            updateStateVisuals();
            syncCircuitLabels();
        }

        function selectQubit(id) {
            activeQubit = id;
            document.querySelectorAll('.qubit-label').forEach((el, idx) => {
                if(idx === id) el.classList.add('active');
                else el.classList.remove('active');
            });
            updateStateVisuals();
        }

        function syncCircuitLabels() {
            for(let i=0; i<3; i++) {
                const q = qubitsState[i];
                let val = "|ψ⟩";
                if (q.theta === 0) val = "|0⟩";
                if (Math.abs(q.theta - Math.PI) < 0.1) val = "|1⟩";
                document.getElementById(`q${i}-lbl`).innerText = `q[${i}]: ${val}`;
            }
        }

        // Sincronização dos Sliders Manuais
        document.getElementById('theta').addEventListener('input', (e) => {
            qubitsState[activeQubit].theta = parseFloat(e.target.value);
            qubitsState[activeQubit].status = 'superposition';
            updateStateVisuals();
        });
        document.getElementById('phi').addEventListener('input', (e) => {
            qubitsState[activeQubit].phi = parseFloat(e.target.value);
            qubitsState[activeQubit].status = 'superposition';
            updateStateVisuals();
        });

        // Rotação Automática Lenta (Sem bloquear o controle do mouse)
        function animate() {
            requestAnimationFrame(animate);
            
            // Faz a esfera rotacionar lentamente de forma contínua
            sphereGroup.rotation.y += 0.003;

            controls.update();
            renderer.render(scene, camera);
        }

        // Garante redimensionamento correto
        function handleResize() {
            const w = container.clientWidth;
            const h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        }

        // Inicialização
        setLanguage('pt');
        animate();

        window.addEventListener('resize', handleResize);
        // Pequeno atraso para capturar as dimensões reais após o render da página
        setTimeout(handleResize, 100);
    </script>
</body>
</html>
