<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esfera de Bloch Interativa</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(15, 23, 42, 0.85);
            --accent-color: #00ffcc;
            --text-color: #f1f5f9;
        }
        body { 
            margin: 0; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
        }
        
        /* Cabeçalho e Seleção de Idioma */
        header {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: var(--panel-bg);
            padding: 15px 25px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 350px;
        }
        h2 { margin: 0 0 5px 0; font-size: 1.3rem; letter-spacing: 1px; color: var(--accent-color); }
        #state-vector { font-family: monospace; font-size: 1.1rem; margin: 10px 0; }
        
        /* Seletor de Idiomas */
        .lang-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 10;
            display: flex;
            gap: 5px;
        }
        .lang-btn {
            background: var(--panel-bg);
            border: 1px solid rgba(255,255,255,0.2);
            color: var(--text-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .lang-btn.active, .lang-btn:hover {
            background: var(--accent-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
        }

        /* Painel Didático */
        #didactic-panel {
            position: absolute;
            top: 150px;
            left: 20px;
            z-index: 10;
            background: var(--panel-bg);
            padding: 15px 25px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 350px;
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .stat-line { margin: 5px 0; font-family: monospace; }

        /* Controles Inferiores */
        .controls { 
            position: absolute; 
            bottom: 30px; 
            left: 50%; 
            transform: translateX(-50%); 
            z-index: 10; 
            display: flex; 
            gap: 25px; 
            background: var(--panel-bg); 
            padding: 20px 30px; 
            border-radius: 16px; 
            backdrop-filter: blur(8px); 
            border: 1px solid rgba(255,255,255,0.1);
        }
        label { display: flex; flex-direction: column; align-items: center; font-size: 0.85rem; letter-spacing: 0.5px; }
        input[type=range] { 
            width: 150px; 
            margin-top: 8px; 
            cursor: pointer;
            accent-color: var(--accent-color);
        }
        
        /* Instrução de arrastar */
        #drag-instruction {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            opacity: 0.6;
            pointer-events: none;
            text-align: center;
        }
    </style>
    <!-- Three.js e OrbitControls para arrastar/rotacionar a câmera -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <!-- Seleção de Idioma -->
    <div class="lang-selector">
        <button class="lang-btn active" onclick="setLanguage('pt')">PT</button>
        <button class="lang-btn" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" onclick="setLanguage('es')">ES</button>
        <button class="lang-btn" onclick="setLanguage('zh')">ZH</button>
    </div>

    <!-- Cabeçalho de Estado -->
    <header>
        <h2 id="title-text">ESFERA DE BLOCH</h2>
        <div id="state-vector">|ψ⟩ = 1.00|0⟩ + 0.00|1⟩</div>
    </header>

    <!-- Painel Didático Dinâmico -->
    <div id="didactic-panel">
        <strong id="analysis-title">Análise do Estado:</strong>
        <p id="explanation-text">O qubit está no estado puro |0⟩ (Polo Norte).</p>
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 10px 0;">
        <div class="stat-line">P(|0⟩): <span id="prob0" style="color: #00ffcc;">100%</span></div>
        <div class="stat-line">P(|1⟩): <span id="prob1" style="color: #ff5555;">0%</span></div>
    </div>

    <div id="drag-instruction">Arrastar com o botão esquerdo rotaciona o espaço 3D</div>

    <!-- Controles deslizantes -->
    <div class="controls">
        <label><span id="label-theta">θ (Latitude)</span>
            <input type="range" id="theta" min="0" max="3.1415" step="0.01" value="0">
        </label>
        <label><span id="label-phi">φ (Longitude)</span>
            <input type="range" id="phi" min="0" max="6.2831" step="0.01" value="0">
        </label>
    </div>

    <script>
        // Dicionário de Idiomas (i18n)
        const translations = {
            pt: {
                title: "ESFERA DE BLOCH",
                analysis: "Análise Quântica:",
                drag: "Arraste para rotacionar a perspectiva da câmera",
                theta: "θ (Theta - Latitude)",
                phi: "φ (Phi - Longitude)",
                pure0: "O qubit está no estado fundamental puro |0⟩. Probabilidade de 100% de colapsar para zero.",
                pure1: "O qubit está no estado excitado puro |1⟩. Probabilidade de 100% de colapsar para um.",
                equator: "Superposição perfeitamente equilibrada! A chance de medir |0⟩ ou |1⟩ é exatamente de 50%.",
                superposition: "O qubit está em superposição coerente. Ele existe em ambos os estados simultaneamente até ser medido."
            },
            en: {
                title: "BLOCH SPHERE",
                analysis: "Quantum Analysis:",
                drag: "Drag to rotate the camera perspective",
                theta: "θ (Theta - Latitude)",
                phi: "φ (Phi - Longitude)",
                pure0: "The qubit is in the pure ground state |0⟩. 100% probability of collapsing to zero.",
                pure1: "The qubit is in the pure excited state |1⟩. 100% probability of collapsing to one.",
                equator: "Perfectly balanced superposition! The chance of measuring |0⟩ or |1⟩ is exactly 50%.",
                superposition: "The qubit is in a coherent superposition. It exists in both states simultaneously until measured."
            },
            es: {
                title: "ESFERA DE BLOCH",
                analysis: "Análisis Cuántico:",
                drag: "Arrastra para rotar la perspectiva de la cámara",
                theta: "θ (Theta - Latitud)",
                phi: "φ (Phi - Longitud)",
                pure0: "El qubit está en el estado fundamental puro |0⟩. 100% de probabilidad de colapsar a cero.",
                pure1: "El qubit está en el estado excitado puro |1⟩. 100% de probabilidad de colapsar a uno.",
                equator: "¡Superposición perfectamente equilibrada! La probabilidad de medir |0⟩ o |1⟩ es exactamente del 50%.",
                superposition: "El qubit está en superposición coherente. Existe en ambos estados simultáneamente hasta ser medido."
            },
            zh: {
                title: "布洛赫球面",
                analysis: "量子态分析:",
                drag: "拖拽以旋转相机视角",
                theta: "θ (西塔 - 纬度)",
                phi: "φ (斐 - 经度)",
                pure0: "量子比特处于纯基态 |0⟩。坍缩为零 prospect 为 100%。",
                pure1: "量子比特处于纯激发态 |1⟩。坍缩为一 prospect 为 100%。",
                equator: "完美平衡的叠加态！测量为 |0⟩ 或 |1⟩ 的概率恰好为 50%。",
                superposition: "量子比特处于相干叠加态。在被测量之前，它同时存在于两种状态中。"
            }
        };

        let currentLang = 'pt';

        function setLanguage(lang) {
            currentLang = lang;
            
            // Atualiza botões ativos
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Traduz elementos da interface
            document.getElementById('title-text').innerText = translations[lang].title;
            document.getElementById('analysis-title').innerText = translations[lang].analysis;
            document.getElementById('drag-instruction').innerText = translations[lang].drag;
            document.getElementById('label-theta').innerText = translations[lang].theta;
            document.getElementById('label-phi').innerText = translations[lang].phi;

            updateState(); // Atualiza a análise textual
        }

        // Setup do Three.js
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Adicionando controle de órbita (interatividade com mouse)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.rotateSpeed = 0.8;

        // Construindo a Esfera
        const sphereGeo = new THREE.SphereGeometry(2, 40, 40);
        const sphereMat = new THREE.MeshBasicMaterial({ color: 0x3b82f6, wireframe: true, transparent: true, opacity: 0.15 });
        const sphere = new THREE.Mesh(sphereGeo, sphereMat);
        scene.add(sphere);

        // Anel do Equador destacado (superposição)
        const ringGeo = new THREE.RingGeometry(1.99, 2.01, 64);
        const ringMat = new THREE.MeshBasicMaterial({ color: 0x00ffcc, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
        const equator = new THREE.Mesh(ringGeo, ringMat);
        equator.rotation.x = Math.PI / 2;
        scene.add(equator);

        // Eixos de Referência
        const axesHelper = new THREE.AxesHelper(2.5);
        scene.add(axesHelper);

        // Vetor de Estado (Seta do Qubit)
        const dir = new THREE.Vector3(0, 1, 0); 
        const origin = new THREE.Vector3(0, 0, 0);
        const arrowHelper = new THREE.ArrowHelper(dir, origin, 2, 0x00ffcc, 0.4, 0.15);
        scene.add(arrowHelper);

        // Posicionamento de Câmera
        camera.position.set(3, 2, 5);
        controls.update();

        // Elementos UI
        const thetaInput = document.getElementById('theta');
        const phiInput = document.getElementById('phi');
        const stateText = document.getElementById('state-vector');
        const explanationText = document.getElementById('explanation-text');
        const prob0Text = document.getElementById('prob0');
        const prob1Text = document.getElementById('prob1');

        function updateState() {
            const theta = parseFloat(thetaInput.value);
            const phi = parseFloat(phiInput.value);

            // Conversão de coordenadas esféricas para cartesianas (eixos padrão do Three.js)
            const x = Math.sin(theta) * Math.cos(phi);
            const z = Math.sin(theta) * Math.sin(phi);
            const y = Math.cos(theta); // No Three.js, Y é a altura (Polo Norte)

            arrowHelper.setDirection(new THREE.Vector3(x, y, z));

            // Cálculo das amplitudes de probabilidade
            const cosTheta2 = Math.cos(theta / 2);
            const sinTheta2 = Math.sin(theta / 2);

            // Probabilidade de colapsar para |0> ou |1> (Norma ao quadrado)
            const p0 = Math.pow(cosTheta2, 2);
            const p1 = Math.pow(sinTheta2, 2);

            // Formatação do vetor ket de estado
            const amp0 = cosTheta2.toFixed(2);
            const amp1 = sinTheta2.toFixed(2);
            stateText.innerHTML = `|ψ⟩ = ${amp0}|0⟩ + e^(i·${phi.toFixed(2)})${amp1}|1⟩`;

            // Atualização das probabilidades na tela
            prob0Text.innerText = `${(p0 * 100).toFixed(0)}%`;
            prob1Text.innerText = `${(p1 * 100).toFixed(0)}%`;

            // Lógica Didática de explicação em tempo real
            let explanation = "";
            if (theta < 0.1) {
                explanation = translations[currentLang].pure0;
            } else if (theta > 3.0) {
                explanation = translations[currentLang].pure1;
            } else if (Math.abs(theta - Math.PI / 2) < 0.15) {
                explanation = translations[currentLang].equator;
            } else {
                explanation = translations[currentLang].superposition;
            }
            explanationText.innerText = explanation;
        }

        thetaInput.addEventListener('input', updateState);
        phiInput.addEventListener('input', updateState);

        // Inicializar Estado Inicial
        updateState();

        // Loop de Renderização
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Permite o arrastar de câmera fluido
            renderer.render(scene, camera);
        }
        animate();

        // Responsividade do Canvas
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
